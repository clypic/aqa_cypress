name: Execute Tests
on:
  schedule:
  - cron: "0 4 * * *"
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run jsonplaceholder
